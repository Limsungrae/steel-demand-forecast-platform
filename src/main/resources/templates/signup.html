<!DOCTYPE html>

<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteelForecast 회원가입</title>


    <link rel="stylesheet" th:href="@{/css/signup.css}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


</head>

<body>

<header class="header">


    <div class="logo">
        <img th:src="@{/images/steel-logo.png}"
             alt="SteelForecast Logo">
    </div>

    <nav>
        <ul class="menu">
            <li><a href="#">대시보드</a></li>
            <li><a href="#">예측 분석</a></li>
            <li><a href="#">품목별 상세</a></li>
            <li><a href="#">마이페이지</a></li>
        </ul>
    </nav>

    <div class="auth-buttons">
        <a href="/login" class="login-link">로그인</a>
        <a href="/signup" class="signup-btn">회원가입</a>
    </div>


</header>

<main class="signup-page">


    <section class="signup-card">

        <div class="signup-badge">
            AI Demand Forecast Platform
        </div>

        <h1>회원가입</h1>

        <p class="subtitle">
            SteelForecast 계정을 생성해주세요.
        </p>

        <form id="signupForm">

            <div class="form-group">

                <label>이름</label>

                <div class="input-box">
                    <i class="fa-regular fa-user"></i>

                    <input
                            type="text"
                            id="name"
                            placeholder="이름을 입력해주세요"
                            required>
                </div>

            </div>

            <div class="form-group">

                <label>이메일</label>

                <div class="input-box">
                    <i class="fa-regular fa-envelope"></i>

                    <input
                            type="email"
                            id="email"
                            placeholder="이메일을 입력해주세요"
                            required>
                </div>

            </div>

            <div class="form-group">

                <label>비밀번호</label>

                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>

                    <input
                            type="password"
                            id="password"
                            placeholder="비밀번호를 입력해주세요"
                            required>
                </div>

            </div>

            <div class="form-group">

                <label>비밀번호 확인</label>

                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>

                    <input
                            type="password"
                            id="passwordConfirm"
                            placeholder="비밀번호를 다시 입력해주세요"
                            required>
                </div>

            </div>

            <div class="form-group">

                <label>회사명</label>

                <div class="input-box">
                    <i class="fa-regular fa-building"></i>

                    <input
                            type="text"
                            id="companyName"
                            placeholder="회사명을 입력해주세요">
                </div>

            </div>

            <label class="check-box">

                <input
                        type="checkbox"
                        id="agree"
                        required>

                <span>
                이용약관 및 개인정보 처리방침에 동의합니다.
            </span>

            </label>

            <button
                    type="submit"
                    class="signup-submit">

                회원가입

            </button>

            <div class="bottom-text">

                이미 계정이 있으신가요?

                <a href="/login">
                    로그인
                </a>

            </div>

        </form>

    </section>
    ```

</main>

<script>

    document
    .getElementById("signupForm")
    .addEventListener("submit", async function(e){

        e.preventDefault();

        const password =
            document.getElementById("password").value;

        const passwordConfirm =
            document.getElementById("passwordConfirm").value;

        if(password !== passwordConfirm){

            alert("비밀번호가 일치하지 않습니다.");

            return;
        }

        const data = {

            name:
                document.getElementById("name").value,

            email:
                document.getElementById("email").value,

            password:
                password,

            companyName:
                document.getElementById("companyName").value
        };

        try{

            const response = await fetch(
                "/api/users/signup",
                {
                    method:"POST",

                    headers:{
                        "Content-Type":"application/json"
                    },

                    body:JSON.stringify(data)
                }
            );

            const result = await response.text();

            alert(result);

            if(result === "회원가입 성공"){

                location.href="/login";
            }

        }catch(error){

            alert("서버 연결 실패");
        }

    });

</script>

</body>
</html>
