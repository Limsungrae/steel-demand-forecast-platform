<!DOCTYPE html>

<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteelForecast 로그인</title>


    <link rel="stylesheet" th:href="@{/css/login.css}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<header class="header">


    <div class="logo">
        <img th:src="@{/images/steel-logo.png}" alt="SteelForecast Logo">
    </div>

    <nav>
        <ul class="menu">
            <li><a href="#">대시보드</a></li>
            <li><a href="#">예측 분석</a></li>
            <li><a href="#">품목별 상세</a></li>
            <li><a href="#">마이페이지</a></li>
        </ul>
    </nav>

    <div class="auth-buttons">
        <a href="/login" class="login-link">로그인</a>
        <a href="/signup" class="signup-btn">회원가입</a>
    </div>


</header>

<main class="login-page">

    <div class="login-card">

        <div class="login-badge">
            AI Demand Forecast Platform
        </div>

        <h1>로그인</h1>

        <p class="subtitle">
            SteelForecast 플랫폼에 오신 것을 환영합니다.
        </p>

        <form id="loginForm">

            <div class="form-group">

                <label>이메일</label>

                <div class="input-box">
                    <i class="fa-regular fa-envelope"></i>

                    <input
                            type="email"
                            id="email"
                            placeholder="이메일을 입력해주세요"
                            required>
                </div>

            </div>

            <div class="form-group">

                <label>비밀번호</label>

                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>

                    <input
                            type="password"
                            id="password"
                            placeholder="비밀번호를 입력해주세요"
                            required>
                </div>

                <a href="#" class="forgot-password">
                    비밀번호를 잊으셨나요?
                </a>

            </div>

            <button type="submit" class="login-btn">
                로그인
            </button>

            <div class="divider">
                <span></span>
                <p>또는</p>
                <span></span>
            </div>

            <button type="button" class="google-btn">
                <i class="fa-brands fa-google"></i>
                Google 계정으로 로그인
            </button>

            <div class="bottom-text">
                계정이 없으신가요?
                <a href="/signup">회원가입</a>
            </div>

        </form>

    </div>


</main>

<script>

    document
        .getElementById("loginForm")
        .addEventListener("submit", async function (e) {

            e.preventDefault();

            const data = {

                email:
                    document.getElementById("email").value,

                password:
                    document.getElementById("password").value
            };

            try {

                const response = await fetch(
                    "/api/users/login",
                    {
                        method: "POST",

                        headers: {
                            "Content-Type": "application/json"
                        },

                        body: JSON.stringify(data)
                    }
                );

                const result = await response.text();

                alert(result);

                if (result === "로그인 성공") {

                    location.href = "/dashboard";
                }

            } catch (error) {

                alert("서버 연결 실패");
            }

        });

</script>

</body>
</html>
